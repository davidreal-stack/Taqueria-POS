{% extends "base.html" %}
{% block content %}
<div class="pos-layout">
    <!-- Left side: Categories & Products -->
    <div class="pos-left">
        <div class="categories-bar" id="categories-container">
            <!-- Populated by JS -->
        </div>
        <div class="products-grid scrollable" id="products-container">
            <!-- Populated by JS -->
        </div>
    </div>
    
    <!-- Right side: Cart -->
    <div class="pos-right glass-panel">
        <div class="cart-header">
            <div class="flex flex-between w-100 mb-1">
                <h2 class="mb-0">Orden Actual</h2>
                <button class="btn btn-sm btn-info" onclick="openPendingOrdersModal()">Ver Pendientes</button>
            </div>
            <select id="order-type" class="form-control">
                <option value="Mesa 1">Mesa 1</option>
                <option value="Mesa 2">Mesa 2</option>
                <option value="Mesa 3">Mesa 3</option>
                <option value="Para llevar">Para llevar</option>
                <option value="Domicilio">Domicilio</option>
            </select>
        </div>
        
        <div class="cart-items scrollable" id="cart-items">
            <!-- Items goes here -->
            <div class="empty-cart text-muted text-center p-2">La orden está vacía</div>
        </div>
        
        <div class="cart-footer">
            <div class="summary-row total-row mb-1">
                <span>Total:</span>
                <span id="cart-total" class="text-success">$0.00</span>
            </div>
            
            <div class="cart-actions grid-2-col">
                <button class="btn btn-danger btn-block" onclick="clearCart()">Cancelar</button>
                <button class="btn btn-success btn-block" onclick="openPaymentModal()" id="btn-pay" disabled>Cobrar</button>
            </div>
            <button class="btn btn-primary btn-block mt-1" onclick="sendOrderToKitchen()" id="btn-send-kitchen" disabled>Enviar a Cocina (Pendiente de Pago)</button>
        </div>
    </div>
</div>

<!-- Modifiers Modal -->
<div id="modifiers-modal" class="modal">
    <div class="modal-content glass-panel">
        <div class="modal-header flex flex-between">
            <h3 id="mod-product-name">Modificadores</h3>
            <button class="btn-close" onclick="closeModal('modifiers-modal')">&times;</button>
        </div>
        <div class="modal-body p-2" id="modifiers-list">
            <!-- Hardcoded for MVP -->
            <div class="mod-checkbox-group">
                <label class="mod-label"><input type="checkbox" value="Queso" data-price="15" class="mod-input"> Con Queso (+$15)</label>
                <label class="mod-label"><input type="checkbox" value="Aguacate" data-price="10" class="mod-input"> Con Aguacate (+$10)</label>
                <label class="mod-label"><input type="checkbox" value="Sin Cebolla" data-price="0" class="mod-input"> Sin Cebolla</label>
            </div>
        </div>
        <div class="modal-footer p-2">
            <button class="btn btn-primary btn-block" onclick="confirmProductAdd()">Agregar</button>
        </div>
    </div>
</div>

<!-- Pending Orders Modal -->
<div id="pending-orders-modal" class="modal">
    <div class="modal-content glass-panel" style="max-width: 650px;">
        <div class="modal-header flex flex-between">
            <h3>Órdenes Pendientes de Pago</h3>
            <button class="btn-close" onclick="closeModal('pending-orders-modal')">&times;</button>
        </div>
        <div class="modal-body p-2" id="pending-orders-list">
            <!-- Populated by JS -->
        </div>
    </div>
</div>

<!-- Payment Modal -->
<div id="payment-modal" class="modal">
    <div class="modal-content glass-panel">
        <div class="modal-header flex flex-between">
            <h3>Cobrar Orden</h3>
            <button class="btn-close" onclick="closeModal('payment-modal')">&times;</button>
        </div>
        <div class="modal-body p-2">
            <h2 class="text-center mb-2 total-display text-success" id="pay-total-display">$0.00</h2>
            
            <div class="form-group">
                <label>Método de Pago</label>
                <select id="payment-method" class="form-control">
                    <option value="efectivo">Efectivo</option>
                    <option value="tarjeta">Tarjeta</option>
                    <option value="transferencia">Transferencia</option>
                </select>
            </div>
            
            <div class="form-group" id="amount-group">
                <label>Efectivo Recibido (Para cambio)</label>
                <input type="number" id="payment-amount" class="form-control" placeholder="0.00" oninput="calculateChange()">
            </div>
            
            <div class="change-display text-center hidden mt-2 p-1 bg-light rounded" id="change-container">
                <h4>Cambio a entregar: <br><span id="change-display-value" class="text-primary fs-large">$0.00</span></h4>
            </div>
        </div>
        <div class="modal-footer p-2">
            <button class="btn btn-success btn-block" onclick="processPayment()">Confirmar y Completar</button>
        </div>
    </div>
</div>

<!-- Receipt Modal -->
<div id="receipt-modal" class="modal">
    <div class="modal-content glass-panel reciept-style">
        <div class="modal-body p-3 text-center">
            <h2 class="text-success mb-1">¡Pago Exitoso!</h2>
            <p>La orden se ha completado y enviado a las áreas correspondientes.</p>
            <div class="mt-2 text-center" id="receipt-change"></div>
            <button class="btn btn-primary btn-block mt-3" onclick="finishOrder()">Nueva Orden</button>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/pos.js') }}"></script>
{% endblock %}
