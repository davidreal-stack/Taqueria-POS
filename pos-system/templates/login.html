{% extends "base.html" %}
{% block content %}
<div class="login-container">
    <div class="login-card glass-panel">
        <div class="login-header text-center">
            <h2>Bienvenido</h2>
            <p>Ingresa tus credenciales para continuar</p>
        </div>
        <form method="POST" action="{{ url_for('auth.login') }}" class="login-form">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" required placeholder="Ej: admin" class="form-control">
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required placeholder="Clave" class="form-control">
            </div>
            <button type="submit" class="btn btn-primary btn-block mt-2">Iniciar Sesión</button>
        </form>
    </div>
</div>
{% endblock %}
